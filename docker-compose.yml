services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mice-travel-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/mice_travel.db
      - FRONTEND_URL=https://e9KKOEecE8lp646CjvT7.runhatch.com
    volumes:
      - /Users/endofsky/Documents/aidev/mice-travel-mate/docker-data/data:/app/data
      - /Users/endofsky/Documents/aidev/mice-travel-mate/docker-data/uploads:/app/uploads
    ports:
      - "8107:8007"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mice-travel-frontend
    restart: unless-stopped
    environment:
      - PORT=3008
      - HOSTNAME=0.0.0.0
    ports:
      - "${PORT:-4004}:3008"
    depends_on:
      - backend
