services:
  nginx:
    image: nginx:alpine
    container_name: mice-travel-nginx
    restart: unless-stopped
    ports:
      - "${PORT:-4004}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mice-travel-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/mice_travel.db
      - FRONTEND_URL=https://e9KKOEecE8lp646CjvT7.runhatch.com
    volumes:
      - ./docker-data/data:/app/data
      - ./docker-data/uploads:/app/uploads
    expose:
      - "8007"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mice-travel-frontend
    restart: unless-stopped
    environment:
      - PORT=3008
      - HOSTNAME=0.0.0.0
      - INTERNAL_API_URL=http://backend:8007
    expose:
      - "3008"
    depends_on:
      backend:
        condition: service_healthy
