  <!-- Text: Travel Mate -->
  <text x="138" y="31" font-family="Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="18" font-weight="400" fill="white" fill-opacity="0.8" letter-spacing="-0.01em">Travel Mate</text>
