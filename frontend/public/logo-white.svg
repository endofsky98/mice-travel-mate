  <!-- Parallels -->
  <line x1="11" y1="19" x2="37" y2="19" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <line x1="11" y1="29" x2="37" y2="29" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <!-- Location pin -->
  <path d="M24 10.5c-4.2 0-7.5 3.3-7.5 7.5 0 7.5 7.5 15 7.5 15s7.5-7.5 7.5-15c0-4.2-3.3-7.5-7.5-7.5z" fill="white" fill-opacity="0.95"/>
  <circle cx="24" cy="18" r="3" fill="#818cf8"/>
  <!-- Small airplane -->
