      <stop stop-color="white" stop-opacity="0.25"/>
      <stop offset="1" stop-color="white" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Icon background -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#iconBgW)" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Globe circle -->
  <circle cx="24" cy="24" r="13" stroke="white" stroke-width="1.4" fill="none" opacity="0.4"/>
