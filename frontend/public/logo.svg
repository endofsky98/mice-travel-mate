<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="globeGrad" x1="30" y1="30" x2="170" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="100" y1="20" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="planeGrad" x1="140" y1="20" x2="180" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#4f46e5" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Globe body -->
  <circle cx="100" cy="105" r="75" fill="url(#globeGrad)" filter="url(#shadow)"/>
  <!-- Globe highlights -->
  <circle cx="100" cy="105" r="75" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  <!-- Latitude lines -->
  <ellipse cx="100" cy="105" rx="45" ry="75" fill="none" stroke="white" stroke-width="1.8" opacity="0.25"/>
  <ellipse cx="100" cy="105" rx="65" ry="75" fill="none" stroke="white" stroke-width="1.2" opacity="0.2"/>
  <line x1="25" y1="80" x2="175" y2="80" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <line x1="25" y1="105" x2="175" y2="105" stroke="white" stroke-width="1.5" opacity="0.15"/>
  <line x1="25" y1="130" x2="175" y2="130" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <!-- Location pin -->
  <g transform="translate(100, 55)">
    <path d="M0 -35C-14 -35 -25 -24 -25 -10C-25 10 0 35 0 35C0 35 25 10 25 -10C25 -24 14 -35 0 -35Z" fill="url(#pinGrad)" filter="url(#shadow)"/>
    <circle cx="0" cy="-10" r="10" fill="white"/>
    <circle cx="0" cy="-10" r="5" fill="#e11d48"/>
  </g>
  <!-- Airplane -->
  <g transform="translate(155, 40) rotate(35)">
    <path d="M0 -12L5 -2L18 4L5 7L0 18L-5 7L-18 4L-5 -2Z" fill="url(#planeGrad)" filter="url(#shadow)"/>
    <circle cx="0" cy="4" r="3" fill="white" opacity="0.8"/>
  </g>
  <!-- Small stars/sparkles -->
  <circle cx="40" cy="50" r="3" fill="white" opacity="0.6"/>
  <circle cx="55" cy="35" r="2" fill="white" opacity="0.4"/>
  <circle cx="160" cy="150" r="2.5" fill="white" opacity="0.5"/>
</svg>
