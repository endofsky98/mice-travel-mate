services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "4108:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/mice_travel.db
      - FRONTEND_URL=https://exporoute.runhatch.com
    volumes:
      - /Users/endofsky/Documents/aidev/mice-travel-mate/docker-data-prod/data:/app/data
      - /Users/endofsky/Documents/aidev/mice-travel-mate/docker-data-prod/uploads:/app/uploads
    expose:
      - "8007"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    restart: unless-stopped
    environment:
      - PORT=3008
      - HOSTNAME=0.0.0.0
      - INTERNAL_API_URL=http://backend:8007
    expose:
      - "3008"
    depends_on:
      backend:
        condition: service_healthy
